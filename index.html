<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snowy随记 · 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        :root {
            --bg-main: #f5f0e6;
            --card-bg: rgba(255,255,255,0.9);
            --text-color: #333;
            --poem-color: #5a4a3c;
            --border-color: #d4c7b0;
            --line-color: #b8a68f;
            --btn-text: #5a4a3c;
            --btn-hover-bg: #8b7d6b;
            --btn-hover-text: #fff;
            --sidebar-bg: #f9f5f0;
            --sidebar-item: #6d5b53;
        }

        body.dark {
            --bg-main: #101828;
            --card-bg: rgba(20,30,48,0.75);
            --text-color: #e0e6ed;
            --poem-color: #c0cddf;
            --border-color: #2a3b4c;
            --line-color: #4a5b6c;
            --btn-text: #c9d1d9;
            --btn-hover-bg: #3a4b5c;
            --btn-hover-text: #fff;
            --sidebar-bg: rgba(22,32,50,0.75);
            --sidebar-item: #c9d1d9;
        }

        body {
            font-family: "KaiTi", "STKaiti", "SimSun", serif;
            background: var(--bg-main);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 修复星星看不见：设置高度 100% */
        .star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999999 !important;
            display: none;
        }
        body.dark .star-container {
            display: block;
        }

        .shining-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px white;
            animation: twinkle 2.5s infinite alternate ease-in-out;
        }

        .moon {
            position: absolute;
            top: 60px;
            right:80px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fffbd5;
            box-shadow: 0 0 30px #fffbd5, 0 0 60px rgba(255,251,213,0.6);
        }

        .shining-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px white, 0 0 30px white;
            animation: twinkle 2.5s infinite alternate ease-in-out;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%,100% { opacity: 0.3;}
            50% { opacity: 1;}
        }
    
        .mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border: 1px var(--border-color);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
        }

        .wrapper {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            align-items: stretch;
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--line-color);
            letter-spacing: 2px;
        }

        .menu-group {
            margin-bottom: 18px;
        }

        .menu-main {
            display: block;
            font-size: 16px;
            color: var(--poem-color);
            padding: 8px 10px;
            border: 1px solid transparent;
            border-left: 3px solid var(--line-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .menu-main:hover {
            background: var(--card-bg);
            border-radius: 6px;
            border-color: var(--border-color);
        }

        .sidebar-btn {
            margin-top: 20px;
            text-align: center;
        }

        .sidebar-btn a {
            display: inline-block;
            padding: 9px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--btn-text);
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .sidebar-btn a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        .sidebar-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 30px;
            border: 1px solid var(--border-color);
        }

        .main-content {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--line-color);
            letter-spacing: 2px;
        }

        .img-day { display: block; }
        .img-night { display: none; }
        body.dark .img-day { display: none; }
        body.dark .img-night { display: block; }

        /* 白天默认图 */
        .img-day { display: block; }
        /* 夜晚替换图 */
        .img-night { display: none; }
        body.dark .img-day { display: none; }
        body.dark .img-night { display: block; }

        .mid-img {
            width: 100%;
            max-width: 520px;
            height: auto;
            border-radius: 12px;
            margin: 0 auto 30px;
        }

        .poem {
            margin: 30px 0;
        }

        .poem-line {
            font-size: 19px;
            line-height: 2;
            color: var(--poem-color);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1s forwards;
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            margin: 25px 0;
            color: var(--line-color);
        }

        .intro {
            font-size: 17px;
            line-height: 1.8;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: var(--line-color);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .main-content {
                padding: 25px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <!-- 黑夜星空+月亮背景 只在暗夜模式显示 -->
    <div class="star-container">
    <div class="star-bg">
        <div class="moon"></div>
    </div>

    <div class="mode-toggle" id="modeBtn">入夜观月</div>

    <div class="wrapper">
        <div class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-title">2026年随记</div>

                <div class="menu-group">
                    <a href="#" class="menu-main">立春 谷雨</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立夏 大暑</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立秋 霜降</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立冬 大寒</a>
                </div>

                <div class="sidebar-btn">
                    <a href="#">踩一踩 🐾</a>
                </div>
            </div>

            <img class="sidebar-img" src="flower.png" alt="侧边小图">
        </div>

        <div class="main-content">
            <h1>snowy随记 · 二零二六年</h1>

            <img class="mid-img img-day" src="DSC01331.JPG" alt="日间图">
            <img class="mid-img img-night" src="moon.png" alt="夜晚图">

            <div class="poem">
                <div class="poem-line">江天一色无纤尘，</div>
                <div class="poem-line">皎皎空中孤月轮。</div>
                <div class="poem-line">江畔何人初见月？</div>
                <div class="poem-line">江月何年初照人？</div>
            </div>

            <div class="divider">—— · ——</div>

            <p class="intro">
                静看云卷云舒，坐听花落鸟鸣，于尘世一隅中，观宇宙思缥缈。
            </p>
        </div>
    </div>

    <footer>丙午年 · 夏记</footer>

        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            btn.innerText = document.body.classList.contains('dark') ? '白日宣纸' : '入夜观月';
        });
    </script>
</body>
</html>
