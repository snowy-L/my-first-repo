<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="snowy 的 2026 年随记，诗词与四季的絮语，日间与夜晚的诗意栖居">
    <title>snowy随记 · 二零二六年</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #f5f0e6;
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-color: #2c2c2c;
            --poem-color: #5a4a3c;
            --border-color: #d4c7b0;
            --line-color: #b8a68f;
            --btn-text: #5a4a3c;
            --btn-hover-bg: #8b7d6b;
            --btn-hover-text: #fff;
            --sidebar-bg: #f9f5f0;
            --shadow-light: 0 8px 22px rgba(0, 0, 0, 0.06);
            --moon-glow: rgba(210, 190, 140, 0.4);
        }

        body.dark {
            --bg-main: radial-gradient(circle at 20% 30%, #0a1022, #0a142c);
            --card-bg: rgba(18, 28, 48, 0.72);
            --text-color: #e6edf5;
            --poem-color: #d6e2ff;
            --border-color: #2e405e;
            --line-color: #5b6f8c;
            --btn-text: #dfe7f5;
            --btn-hover-bg: #405e82;
            --btn-hover-text: #fff;
            --sidebar-bg: rgba(22, 34, 55, 0.68);
            --shadow-light: 0 12px 28px rgba(0, 0, 0, 0.45);
            --moon-glow: rgba(255, 235, 170, 0.65);
        }

        body {
            font-family: "KaiTi", "STKaiti", "Georgia", "SimSun", serif;
            background: var(--bg-main);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999;
            display: none;
        }
        body.dark .star-container {
            display: block;
        }

        .shining-star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px #fff, 0 0 12px rgba(255, 248, 200, 0.7);
            animation: twinkle 2.8s infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .meteor {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(95deg, rgba(255, 255, 245, 0.9), rgba(200, 210, 255, 0.2));
            border-radius: 999px;
            filter: blur(1px);
            opacity: 0;
            animation: meteorFall 9s infinite linear;
        }

        @keyframes meteorFall {
            0% { transform: translateX(0) translateY(0); opacity: 0; }
            12% { opacity: 0.9; }
            100% { transform: translateX(-550px) translateY(520px); opacity: 0; }
        }

        /* 右上角月亮 ✅ */
        .night-moon {
            position: fixed;
            top: 20px;
            right: 88px;
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 35% 35%, #fff7e8, #ffebb5);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--moon-glow), 0 0 28px rgba(255, 220, 120, 0.5);
            pointer-events: none;
            z-index: 1000000;
            opacity: 0;
            transition: opacity 0.7s ease, transform 0.6s ease;
            transform: scale(0.92);
            background-image: radial-gradient(circle at 25% 40%, rgba(160, 120, 70, 0.12) 2%, transparent 2.5%),
                              radial-gradient(circle at 70% 65%, rgba(120, 85, 45, 0.1) 1.8%, transparent 2%);
            background-size: 22px 22px, 32px 32px;
        }
        body.dark .night-moon {
            opacity: 1;
            transform: scale(1);
            animation: moonFloat 4s infinite alternate ease-in-out;
        }

        @keyframes moonFloat {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-5px) scale(1.02); }
        }

        .mode-toggle {
            position: fixed;
            top: 26px;
            right: 18px;
            padding: 6px 15px;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            font-family: inherit;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 1000010;
            backdrop-filter: blur(8px);
            transition: all 0.35s ease;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .mode-toggle:hover {
            transform: scale(1.04);
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        .wrapper {
            display: flex;
            gap: 28px;
            max-width: 1080px;
            margin: 0 auto;
            width: 100%;
            align-items: stretch;
        }

        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-light);
            transition: all 0.5s ease;
        }

        .sidebar-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1.5px dashed var(--line-color);
            letter-spacing: 2.5px;
            font-weight: normal;
        }

        .menu-group {
            margin-bottom: 16px;
        }

        .menu-main {
            display: block;
            font-size: 16.5px;
            color: var(--poem-color);
            padding: 9px 12px;
            border-left: 3px solid var(--line-color);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: transparent;
        }

        .menu-main:hover {
            background: rgba(160, 140, 120, 0.18);
            padding-left: 20px;
            border-left-width: 4px;
            color: var(--text-color);
        }

        .sidebar-btn {
            margin-top: 24px;
            text-align: center;
        }

        .sidebar-btn a {
            display: inline-block;
            padding: 9px 24px;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            color: var(--btn-text);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            background: rgba(245, 240, 230, 0.2);
        }

        .sidebar-btn a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
        }

        .sidebar-img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            margin-top: 28px;
            border: 1px solid var(--border-color);
            transition: all 0.5s;
            filter: brightness(0.96) contrast(1.02);
        }
        body.dark .sidebar-img {
            filter: brightness(0.7) contrast(1.1) sepia(0.1);
        }

        .main-content {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 36px 32px;
            box-shadow: var(--shadow-light);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.55s ease;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1.5px dashed var(--line-color);
            letter-spacing: 3px;
            font-weight: 450;
        }

        .img-day { display: block; }
        .img-night { display: none; }
        body.dark .img-day { display: none; }
        body.dark .img-night { display: block; }

        .mid-img {
            width: 100%;
            max-width: 540px;
            height: auto;
            border-radius: 20px;
            margin: 0 auto 28px;
            transition: all 0.5s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        /* 白天诗词 ✅ */
        .poem-day { display: block; }
        /* 夜晚诗词 ✅ */
        .poem-night { display: none; }
        body.dark .poem-day { display: none; }
        body.dark .poem-night { display: block; }

        .poem {
            margin: 30px 0 20px;
        }

        .poem-line {
            font-size: 20px;
            line-height: 2.2;
            color: var(--poem-color);
            opacity: 0;
            transform: translateY(14px);
            animation: poemRise 0.95s forwards;
            letter-spacing: 1.2px;
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }

        @keyframes poemRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            margin: 28px 0 22px;
            color: var(--line-color);
            letter-spacing: 3px;
        }

        .intro {
            font-size: 17px;
            line-height: 1.75;
            max-width: 550px;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 13px;
            color: var(--line-color);
            letter-spacing: 2px;
            opacity: 0.75;
        }

        @media (max-width: 780px) {
            body { padding: 14px; }
            .wrapper { flex-direction: column; gap: 18px; }
            .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; align-items: center; padding: 18px 22px; }
            .sidebar-top { width: 100%; display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
            .sidebar-title { margin-bottom: 0; border-bottom: none; font-size: 18px; }
            .menu-group { display: inline-block; margin: 0 4px; }
            .menu-main { display: inline-block; border-left: none; border-bottom: 1px solid var(--line-color); padding: 6px 12px; margin: 0 3px; font-size: 14px;}
            .menu-main:hover { padding-left: 12px; background: none; }
            .sidebar-img { max-width: 110px; margin-top: 0; margin-left: auto; }
            .sidebar-btn { margin-top: 0; }
            .main-content { padding: 26px 20px; }
            h1 { font-size: 24px; }
            .poem-line { font-size: 18px; line-height: 1.9; }
            .night-moon { width: 40px; height: 40px; right: 75px; top: 16px; }
            .mode-toggle { top: 20px; right: 14px; padding: 5px 12px; font-size: 12px; }
        }

        @media (max-width: 520px) {
            .night-moon { width: 34px; height: 34px; right: 62px; top: 16px; }
            .mode-toggle { right: 10px; top: 18px; }
            .sidebar-top { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="star-container"></div>
    <div class="night-moon"></div>
    <button class="mode-toggle" id="modeBtn">入夜观月</button>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-title"> 2026 </div>
                <div class="menu-group"><a href="javascript:void(0)" class="menu-main">🌱 立春·谷雨</a></div>
                <div class="menu-group"><a href="javascript:void(0)" class="menu-main">🌺 立夏·大暑</a></div>
                <div class="menu-group"><a href="javascript:void(0)" class="menu-main">🍂 立秋·霜降</a></div>
                <div class="menu-group"><a href="javascript:void(0)" class="menu-main">❄️ 立冬·大寒</a></div>
                <div class="sidebar-btn"><a href="javascript:void(0)">🐾 踩一踩</a></div>
            </div>
            <img class="sidebar-img" src="flower.png" alt="花卉">
        </aside>

        <main class="main-content">
            <h1>snowy随记 · 二零二六年</h1>

            <img class="mid-img img-day" src="DSC01331.JPG" alt="白日景色">
            <img class="mid-img img-night" src="moon.png" alt="夜景">

            <!-- 白天诗词 ✅ -->
            <div class="poem poem-day">
                <div class="poem-line">青山隐隐水迢迢，</div>
                <div class="poem-line">秋尽江南草未凋。</div>
                <div class="poem-line">二十四桥明月夜，</div>
                <div class="poem-line">玉人何处教吹箫。</div>
            </div>

            <!-- 夜晚诗词 ✅ -->
            <div class="poem poem-night">
                <div class="poem-line">江天一色无纤尘，</div>
                <div class="poem-line">皎皎空中孤月轮。</div>
                <div class="poem-line">江畔何人初见月？</div>
                <div class="poem-line">江月何年初照人？</div>
            </div>

            <p class="intro">静看云卷云舒，坐听花落鸟鸣，于尘世一隅中，观宇宙思缥缈。</p>
        </main>
    </div>

    <footer>丙午年 · 夏记</footer>

    <script>
        let starfieldReady = false;
        function buildStarsAndMeteors() {
            if (starfieldReady) return;
            const container = document.querySelector('.star-container');
            for (let i = 0; i < 58; i++) {
                const star = document.createElement('div');
                star.classList.add('shining-star');
                const size = Math.random() * 2.2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(star);
            }
            for (let i = 0; i < 34; i++) {
                const faintStar = document.createElement('div');
                faintStar.classList.add('shining-star');
                const tiny = Math.random() * 1.2 + 0.6;
                faintStar.style.width = tiny + 'px';
                faintStar.style.height = tiny + 'px';
                faintStar.style.left = Math.random() * 100 + '%';
                faintStar.style.top = Math.random() * 100 + '%';
                faintStar.style.opacity = '0.5';
                container.appendChild(faintStar);
            }
            for (let i = 0; i < 4; i++) {
                const meteor = document.createElement('div');
                meteor.classList.add('meteor');
                meteor.style.top = Math.random() * 65 + '%';
                meteor.style.left = Math.random() * 80 + 10 + '%';
                meteor.style.animationDelay = Math.random() * 7 + 's';
                container.appendChild(meteor);
            }
            starfieldReady = true;
        }

        const toggleBtn = document.getElementById('modeBtn');
        const bodyEl = document.body;

        toggleBtn.addEventListener('click', () => {
            bodyEl.classList.toggle('dark');
            if (bodyEl.classList.contains('dark')) {
                toggleBtn.innerText = '☀️ 白日宣纸';
                buildStarsAndMeteors();
            } else {
                toggleBtn.innerText = '🌙 入夜观月';
            }
        });
    </script>
</body>
</html>
