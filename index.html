<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古风雅韵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "KaiTi", "STKaiti", "SimSun", serif;
            background-color: #f5f0e6; /* 宣纸底色 */
            color: #333;
            background-image: url("https://cdn.jsdelivr.net/gh/your-image-url/ink-bg.png"); /* 可替换为自己的水墨背景 */
            background-size: cover;
            background-attachment: fixed;
            line-height: 1.8;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            padding: 3rem;
            border: 1px solid #d4c7b0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 4px;
            position: relative;
        }

        /* 模拟古籍的装订线 */
        .container::before {
            content: "";
            position: absolute;
            left: 2rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #d4c7b0;
        }

        h1 {
            font-size: 2.2rem;
            color: #2b2b2b;
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #8b7d6b;
            letter-spacing: 0.2em;
        }

        .poem {
            font-size: 1.3rem;
            text-align: center;
            margin: 2rem 0;
            color: #5a4a3c;
            line-height: 2;
        }

        .intro {
            font-size: 1.1rem;
            margin: 2rem 0;
            color: #444;
            text-indent: 2em;
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            color: #b8a68f;
            font-size: 1.5rem;
        }

        .btn {
            display: block;
            width: fit-content;
            margin: 2rem auto 0;
            padding: 0.8rem 2rem;
            border: 1px solid #8b7d6b;
            color: #5a4a3c;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.3s;
            letter-spacing: 0.1em;
        }

        .btn:hover {
            background-color: #8b7d6b;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #8b7d6b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>古风雅韵</h1>

        <div class="poem">
            青山隐隐水迢迢，<br>
            秋尽江南草未凋。<br>
            二十四桥明月夜，<br>
            玉人何处教吹箫。
        </div>

        <div class="divider">
            —— · ——
        </div>

        <p class="intro">
            这里是我的一方小天地，记录着我的随笔与日常。愿在这一隅，寻一份悠然与安宁。
        </p>

        <a href="#" class="btn">查看更多</a>
    </div>

    <footer>
        丙午年 · 夏 记
    </footer>
</body>
</html>
