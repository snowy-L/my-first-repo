<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snowy随记 · 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        :root {
            --bg-main: #f5f0e6;
            --card-bg: rgba(255,255,255,0.9);
            --text-color: #333;
            --poem-color: #5a4a3c;
            --border-color: #d4c7b0;
            --line-color: #b8a68f;
            --btn-text: #5a4a3c;
            --btn-hover-bg: #8b7d6b;
            --btn-hover-text: #fff;
            --sidebar-bg: #f9f5f0;
            --sidebar-item: #6d5b53;
        }

        body.dark {
            --bg-main: #0c141c;
            --card-bg: rgba(15,22,30,0.9);
            --text-color: #e0e6ed;
            --poem-color: #c0cddf;
            --border-color: #2a3b4c;
            --line-color: #4a5b6c;
            --btn-text: #c9d1d9;
            --btn-hover-bg: #3a4b5c;
            --btn-hover-text: #fff;
            --sidebar-bg: #121a24;
            --sidebar-item: #c9d1d9;
        }

        body {
            font-family: "KaiTi", "STKaiti", "SimSun", serif;
            background: var(--bg-main);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
        }

        .wrapper {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            align-items: stretch; /* 左右高度自动对齐 */
        }

        /* 左侧侧边栏 加宽、和右侧等高 */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--line-color);
            letter-spacing: 2px;
        }

        /* 分类可点击样式 */
        .menu-group {
            margin-bottom: 18px;
        }

        .menu-main {
            display: block;
            font-size: 16px;
            color: var(--poem-color);
            padding: 8px 10px;
            border: 1px solid transparent;
            border-left: 3px solid var(--line-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .menu-main:hover {
            background: var(--card-bg);
            border-radius: 6px;
            border-color: var(--border-color);
        }

        /* 左侧按钮统一样式 */
        .sidebar-btn {
            margin-top: 20px;
            text-align: center;
        }

        .sidebar-btn a {
            display: inline-block;
            padding: 9px 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--btn-text);
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .sidebar-btn a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        /* 左侧底部小图预留位置 */
        .sidebar-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 30px;
            border: 1px solid var(--border-color);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--line-color);
            letter-spacing: 2px;
        }

        .mid-img {
            width: 100%;
            max-width: 520px;
            height: auto;
            border-radius: 12px;
            margin: 0 auto 30px;
        }

        .poem {
            margin: 30px 0;
        }

        .poem-line {
            font-size: 19px;
            line-height: 2;
            color: var(--poem-color);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1s forwards;
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            margin: 25px 0;
            color: var(--line-color);
        }

        .intro {
            font-size: 17px;
            line-height: 1.8;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: var(--line-color);
            letter-spacing: 1px;
        }

        /* 手机自适应 */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .main-content {
                padding: 25px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="mode-toggle" id="modeBtn">入夜观月</div>

    <div class="wrapper">
        <!-- 左侧栏 -->
        <div class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-title">2026年随记</div>

                <div class="menu-group">
                    <a href="#" class="menu-main">立春 谷雨</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立夏 大暑</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立秋 霜降</a>
                </div>
                <div class="menu-group">
                    <a href="#" class="menu-main">立冬 大寒</a>
                </div>

                <div class="sidebar-btn">
                    <a href="#">踩一踩 🐾</a>
                </div>
            </div>

            <!-- 左下新增小图 后续把 small.jpg 换成你上传的图片名即可 -->
            <img class="sidebar-img" src="flower.png" alt="侧边小图">
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <h1>snowy随记 · 二零二六年</h1>

            <img class="mid-img" src="DSC01331.JPG" alt="古风配图">

            <div class="poem">
                <div class="poem-line">布衣何用揖王公，</div>
                <div class="poem-line">归向芦根濯软红。</div>
                <div class="poem-line">自觉此心无一事，</div>
                <div class="poem-line">小鱼跳出绿萍中。</div>
            </div>

            <div class="divider">—— · ——</div>

            <p class="intro">
                静看云卷云舒，坐听花落鸟鸣，于尘世一隅中，观宇宙思缥缈。
            </p>
        </div>
    </div>

    <footer>丙午年 · 夏记</footer>

    <script>
        const btn = document.getElementById('modeBtn');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            btn.innerText = document.body.classList.contains('dark') ? '白日宣纸' : '入夜观月';
        });
    </script>
</body>
</html>
