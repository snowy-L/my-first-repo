<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snowy随记 · 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        :root {
            --bg-main: #f5f0e6;
            --card-bg: rgba(255,255,255,0.9);
            --text-color: #333;
            --poem-color: #5a4a3c;
            --border-color: #d4c7b0;
            --line-color: #b8a68f;
            --btn-text: #5a4a3c;
            --btn-hover-bg: #8b7d6b;
            --btn-hover-text: #fff;
            --sidebar-bg: #f9f5f0;
            --sidebar-item: #6d5b53;
        }

        body.dark {
            --bg-main: #0c141c;
            --card-bg: rgba(15,22,30,0.9);
            --text-color: #e0e6ed;
            --poem-color: #c0cddf;
            --border-color: #2a3b4c;
            --line-color: #4a5b6c;
            --btn-text: #c9d1d9;
            --btn-hover-bg: #3a4b5c;
            --btn-hover-text: #fff;
            --sidebar-bg: #121a24;
            --sidebar-item: #c9d1d9;
        }

        body {
            font-family: "KaiTi", "STKaiti", "SimSun", serif;
            background: var(--bg-main);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
        }

        /* 布局：电脑左右，手机上下 */
        .wrapper {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            align-items: flex-start;
        }

        /* 左侧分类 */
        .sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px 20px;
            position: sticky;
            top: 30px;
        }

        .sidebar-title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--line-color);
        }

        .menu-group {
            margin-bottom: 14px;
        }

        .menu-main {
            font-size: 16px;
            color: var(--poem-color);
            padding-left: 8px;
            border-left: 3px solid var(--line-color);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--line-color);
            letter-spacing: 2px;
        }

        .mid-img {
            width: 100%;
            max-width: 520px;
            height: auto;
            display: block;
            margin: 0 auto 30px;
            border-radius: 12px;
        }

        .poem {
            text-align: center;
            margin: 30px 0;
        }

        .poem-line {
            font-size: 19px;
            line-height: 2;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 1s forwards;
        }

        .poem-line:nth-child(1) { animation-delay: 0.2s; }
        .poem-line:nth-child(2) { animation-delay: 0.4s; }
        .poem-line:nth-child(3) { animation-delay: 0.6s; }
        .poem-line:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: var(--line-color);
        }

        .intro {
            text-align: center;
            font-size: 17px;
            line-height: 1.8;
            margin: 20px 0;
        }

        .btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 10px 22px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--btn-text);
            text-decoration: none;
        }

        .btn:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--line-color);
        }

        /* 手机自适应 */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
            }
            .main-content {
                padding: 25px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="mode-toggle" id="modeBtn">入夜观月</div>

    <div class="wrapper">
        <!-- 左侧分类 -->
        <div class="sidebar">
            <div class="sidebar-title">2026年随记</div>

            <div class="menu-group">
                <div class="menu-main">立春 • 谷雨</div>
            </div>
            <div class="menu-group">
                <div class="menu-main">立夏 • 大暑</div>
            </div>
            <div class="menu-group">
                <div class="menu-main">立秋 • 霜降</div>
            </div>
            <div class="menu-group">
                <div class="menu-main">立冬 • 大寒</div>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="main-content">
            <h1>snowy随记 · 二零二六年</h1>

            <img class="mid-img" src="DSC01331.JPG" alt="古风配图">

            <div class="poem">
                <div class="poem-line">青山隐隐水迢迢，</div>
                <div class="poem-line">秋尽江南草未凋。</div>
                <div class="poem-line">二十四桥明月夜，</div>
                <div class="poem-line">玉人何处教吹箫。</div>
            </div>

            <div class="divider">—— · ——</div>

            <p class="intro">
                静看云卷云舒，坐听花落鸟鸣，于尘世一隅中，观宇宙思缥缈。
            </p>

            <a href="#" class="btn">踩一踩 🐾</a>
        </div>
    </div>

    <footer>丙午年 · 夏记</footer>

    <script>
        const btn = document.getElementById('modeBtn');
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            btn.innerText = document.body.classList.contains('dark') ? '白日宣纸' : '入夜观月';
        });
    </script>
</body>
</html>
